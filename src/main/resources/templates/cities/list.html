<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Villes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<section layout:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Villes</h1>
    <a th:href="@{/cities/new}" class="btn btn-success">Ajouter une ville</a>
  </div>

  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th style="width: 160px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="city : ${cities}">
      <td th:text="${city.id}"></td>
      <td th:text="${city.name}"></td>
      <td>
        <a th:href="@{'/cities/edit/' + ${city.id}}" class="btn btn-warning btn-sm">Modifier</a>
        <a th:href="@{'/cities/delete/' + ${city.id}}" class="btn btn-danger btn-sm"
           onclick="return confirm('Supprimer cette ville ?')">Supprimer</a>
      </td>
    </tr>
    </tbody>
  </table>
</section>
</body>
</html>
