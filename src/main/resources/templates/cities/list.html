<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Villes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section layout:fragment="content" class="container py-4">

  <!-- En-tête -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <h1 class="mb-2">Villes</h1>
      <p class="text-muted mb-0">
        Découvrez les villes dans lesquelles Distopia Cinema est présent.
      </p>
    </div>
  </div>

  <!-- Liste des villes -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">

      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="h4 mb-0">Liste des villes</h2>
        <span class="text-muted"
              th:text="${cities != null ? #lists.size(cities) + ' ville(s)' : '0 ville'}">
          0 ville
        </span>
      </div>

      <div th:if="${cities != null and !#lists.isEmpty(cities)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="city : ${cities}">
          <div class="card h-100 border-0 shadow-sm overflow-hidden">

            <a th:href="@{/cities/view/{id}(id=${city.id})}"
               class="text-decoration-none text-dark">

              <img th:if="${city.imageUrl != null and !#strings.isEmpty(city.imageUrl)}"
                   th:src="@{${city.imageUrl}}"
                   th:alt="${city.name}"
                   class="img-fluid w-100"
                   style="height: 240px; object-fit: cover;">

              <div th:if="${city.imageUrl == null or #strings.isEmpty(city.imageUrl)}"
                   class="d-flex align-items-center justify-content-center bg-light text-muted"
                   style="height: 240px;">
                Aucune image disponible
              </div>

              <div class="card-body">
                <h3 class="h5 card-title mb-2" th:text="${city.name}">
                  Nom de la ville
                </h3>

                <p class="card-text text-muted mb-0">
                  Cliquez pour découvrir les cinémas disponibles dans cette ville.
                </p>
              </div>

            </a>
          </div>
        </div>
      </div>

      <div th:if="${cities == null or #lists.isEmpty(cities)}"
           class="alert alert-info mb-0">
        Aucune ville disponible pour le moment.
      </div>

    </div>
  </div>

</section>
</body>
</html>
