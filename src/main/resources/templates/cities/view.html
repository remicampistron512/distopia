<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title th:text="${city.name} + ' - Distopia Cinema'">Détail de la ville</title>
</head>

<body>
<section layout:fragment="content" class="container py-4">

  <!-- Header card -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
        <div>
          <p class="text-uppercase text-muted small mb-2">Ville</p>
          <h1 class="mb-2" th:text="${city.name}">Nom de la ville</h1>
          <p class="text-muted mb-0">Découvrez les cinémas disponibles dans cette ville.</p>
        </div>

        <div>
          <a th:href="@{/cities}" class="btn btn-outline-secondary">Retour à la liste</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Related content card -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h2 class="h4 mb-4">Cinémas</h2>

      <div th:if="${city.cinemas != null and !#lists.isEmpty(city.cinemas)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="cinema : ${city.cinemas}">
          <div class="card h-100 border-0 shadow-sm">
            <img th:if="${cinema.imageUrl != null and !#strings.isEmpty(cinema.imageUrl)}"
                 th:src="@{${cinema.imageUrl}}"
                 th:alt="${cinema.name}"
                 class="card-img-top"
                 style="height: 220px; object-fit: cover;">

            <div th:if="${cinema.imageUrl == null or #strings.isEmpty(cinema.imageUrl)}"
                 class="d-flex align-items-center justify-content-center bg-light text-muted"
                 style="height: 220px;">
              Aucune image disponible
            </div>

            <div class="card-body d-flex flex-column">
              <h3 class="h5 card-title mb-3" th:text="${cinema.name}">Nom du cinéma</h3>

              <p class="card-text mb-2">
                <strong>Adresse :</strong>
                <span th:text="${cinema.address != null ? cinema.address : 'Non renseignée'}">Adresse</span>
              </p>

              <p class="card-text mb-3">
                <strong>Note public :</strong>
                <span th:text="${cinema.communityRating}">4.5</span>
              </p>

              <a th:href="@{/cinemas/view/{id}(id=${cinema.id})}" class="btn btn-primary mt-auto">
                Voir le cinéma
              </a>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${city.cinemas == null or #lists.isEmpty(city.cinemas)}"
           class="alert alert-info mb-0">
        Aucun cinéma n’est disponible dans cette ville.
      </div>
    </div>
  </div>

</section>
</body>
</html>
