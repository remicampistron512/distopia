<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Formulaire Ville</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h1 th:text="${city.id == null ? 'Créer une ville' : 'Modifier la ville'}">Formulaire Ville</h1>

  <form th:action="@{/cities/save}" th:object="${city}" method="post">
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
      <label class="form-label">Nom</label>
      <input type="text" th:field="*{name}" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a th:href="@{/cities}" class="btn btn-secondary">Annuler</a>
  </form>
</div>
</body>
</html>
