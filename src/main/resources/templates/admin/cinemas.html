<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Administration des cinémas</title>
</head>

<body>
<section layout:fragment="content">

  <div class="py-2">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="mb-1">Administration des cinémas</h1>
        <p class="text-muted mb-0">Gérer les cinémas de l’application</p>
      </div>
      <a th:href="@{/}" class="btn btn-outline-secondary">Retour à l'accueil</a>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white">
        <h2 class="h5 mb-0"
            th:text="${cinema != null and cinema.id != 0 ? 'Modifier un cinéma' : 'Ajouter un cinéma'}">
          Ajouter un cinéma
        </h2>
      </div>
      <div class="card-body">

        <form th:action="@{/cinemas/save}"
              th:object="${cinema}"
              method="post"
              enctype="multipart/form-data">

          <input type="hidden" th:field="*{id}">

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="name" class="form-label">Nom</label>
              <input id="name" type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
              <label for="communityRating" class="form-label">Note des utilisateurs</label>
              <input id="communityRating" type="number" step="0.1" min="0" max="5"
                     th:field="*{communityRating}" class="form-control" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="address" class="form-label">Adresse</label>
            <input id="address" type="text" th:field="*{address}" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="city" class="form-label">Ville</label>
            <select id="city" th:field="*{city}" class="form-select" required>
              <option value="">-- Sélectionner une ville --</option>
              <option th:each="city : ${cities}"
                      th:value="${city.id}"
                      th:text="${city.name}">
              </option>
            </select>
          </div>

          <div class="mb-3">
            <label for="image" class="form-label">Image du cinéma</label>
            <input id="image" type="file" name="image" class="form-control" accept="image/*">
            <div class="form-text">Formats acceptés : JPG, PNG, WEBP.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a th:href="@{/cinemas/admin}" class="btn btn-secondary">Réinitialiser</a>
          </div>
        </form>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h2 class="h5 mb-0">Liste des cinémas</h2>
      </div>
      <div class="card-body">

        <div th:if="${#lists.isEmpty(cinemas)}" class="alert alert-info mb-0">
          Aucun cinéma disponible.
        </div>

        <div th:unless="${#lists.isEmpty(cinemas)}" class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Adresse</th>
              <th>Ville</th>
              <th>Note</th>
              <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cinemaItem : ${cinemas}">
              <td th:text="${cinemaItem.id}">1</td>
              <td th:text="${cinemaItem.name}">Cinéma Central</td>
              <td th:text="${cinemaItem.address}">12 rue de Paris</td>
              <td th:text="${cinemaItem.city != null ? cinemaItem.city.name : 'Non définie'}">Paris</td>
              <td>
                <span class="badge bg-success" th:text="${cinemaItem.communityRating}">4.5</span>
              </td>
              <td class="text-end">
                <a th:href="@{'/cinemas/edit/' + ${cinemaItem.id}}" class="btn btn-warning btn-sm">Modifier</a>
                <a th:href="@{'/cinemas/delete/' + ${cinemaItem.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Voulez-vous vraiment supprimer ce cinéma ?')">
                  Supprimer
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

  </div>

</section>
</body>
</html>
