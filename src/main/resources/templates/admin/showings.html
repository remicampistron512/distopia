<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Administration des séances</title>
</head>

<body>
<section layout:fragment="content">

  <div class="py-2">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="mb-1">Administration des séances</h1>
        <p class="text-muted mb-0">Gérer les séances de l’application</p>
      </div>
      <a th:href="@{/}" class="btn btn-outline-secondary">Retour à l'accueil</a>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white">
        <h2 class="h5 mb-0">Ajouter une séance</h2>
      </div>

      <div class="card-body">

        <form th:action="@{/showings/save}" method="post">

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="startDateTime" class="form-label">Date et heure</label>
              <input id="startDateTime"
                     type="datetime-local"
                     name="startDateTime"
                     class="form-control"
                     required>
            </div>

            <div class="col-md-3 mb-3">
              <label for="price" class="form-label">Prix</label>
              <input id="price"
                     type="number"
                     step="0.01"
                     min="0"
                     name="price"
                     class="form-control"
                     required>
            </div>

            <div class="col-md-3 mb-3">
              <label for="availableSeats" class="form-label">Places disponibles</label>
              <input id="availableSeats"
                     type="number"
                     min="0"
                     name="availableSeats"
                     class="form-control"
                     required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="cinemaId" class="form-label">Cinéma</label>
              <select id="cinemaId" name="cinemaId" class="form-select" required>
                <option value="">-- Sélectionner un cinéma --</option>
                <option th:each="cinema : ${cinemas}"
                        th:value="${cinema.id}"
                        th:text="${cinema.name}">
                </option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label for="movieId" class="form-label">Film</label>
              <select id="movieId" name="movieId" class="form-select" required>
                <option value="">-- Sélectionner un film --</option>
                <option th:each="movie : ${movies}"
                        th:value="${movie.id}"
                        th:text="${movie.title}">
                </option>
              </select>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              Ajouter
            </button>

            <a th:href="@{/showings/admin}" class="btn btn-secondary">
              Réinitialiser
            </a>
          </div>

        </form>

      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h2 class="h5 mb-0">Liste des séances</h2>
      </div>

      <div class="card-body">

        <div th:if="${#lists.isEmpty(showings)}" class="alert alert-info mb-0">
          Aucune séance disponible.
        </div>

        <div th:unless="${#lists.isEmpty(showings)}" class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Film</th>
              <th>Cinéma</th>
              <th>Date et heure</th>
              <th>Prix</th>
              <th>Places</th>
              <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="showingItem : ${showings}">
              <td th:text="${showingItem.id}">1</td>
              <td th:text="${showingItem.movie != null ? showingItem.movie.title : 'Non défini'}">
                Interstellar
              </td>
              <td th:text="${showingItem.cinema != null ? showingItem.cinema.name : 'Non défini'}">
                Cinéma Central
              </td>
              <td th:text="${showingItem.startDateTime != null ? #temporals.format(showingItem.startDateTime, 'dd/MM/yyyy HH:mm') : 'Non définie'}">
                08/04/2026 20:00
              </td>
              <td th:text="${showingItem.price}">12.50</td>
              <td>
                <span class="badge bg-success"
                      th:text="${showingItem.availableSeats}">
                  80
                </span>
              </td>
              <td class="text-end">
                <a th:href="@{'/showings/edit/' + ${showingItem.id}}"
                   class="btn btn-warning btn-sm">
                  Modifier
                </a>

                <a th:href="@{'/showings/delete/' + ${showingItem.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Voulez-vous vraiment supprimer cette séance ?')">
                  Supprimer
                </a>
              </td>
            </tr>
            </tbody>

          </table>
        </div>

      </div>
    </div>

  </div>

</section>
</body>
</html>
