<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Administration des villes</title>
</head>

<body>
<section layout:fragment="content">

  <div class="py-2">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="mb-1">Administration des villes</h1>
        <p class="text-muted mb-0">Gérer les villes de l’application</p>
      </div>
      <a th:href="@{/}" class="btn btn-outline-secondary">Retour à l'accueil</a>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white">
        <h2 class="h5 mb-0"
            th:text="${city != null and city.id != 0 ? 'Modifier une ville' : 'Ajouter une ville'}">
          Ajouter une ville
        </h2>
      </div>
      <div class="card-body">
        <form th:action="@{/cities/save}"
              th:object="${city}"
              method="post"
              enctype="multipart/form-data">

          <input type="hidden" th:field="*{id}">

          <div class="mb-3">
            <label for="name" class="form-label">Nom</label>
            <input id="name" type="text" th:field="*{name}" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="image" class="form-label">Image de la ville</label>
            <input id="image" type="file" name="image" class="form-control" accept="image/*">
            <div class="form-text">Formats acceptés : JPG, PNG, WEBP.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a th:href="@{/cities/admin}" class="btn btn-secondary">Réinitialiser</a>
          </div>
        </form>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h2 class="h5 mb-0">Liste des villes</h2>
      </div>
      <div class="card-body">

        <div th:if="${#lists.isEmpty(cities)}" class="alert alert-info mb-0">
          Aucune ville disponible.
        </div>

        <div th:unless="${#lists.isEmpty(cities)}" class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cityItem : ${cities}">
              <td th:text="${cityItem.id}">1</td>
              <td th:text="${cityItem.name}">Paris</td>
              <td class="text-end">
                <a th:href="@{'/cities/edit/' + ${cityItem.id}}" class="btn btn-warning btn-sm">Modifier</a>
                <a th:href="@{'/cities/delete/' + ${cityItem.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Voulez-vous vraiment supprimer cette ville ?')">
                  Supprimer
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

  </div>

</section>
</body>
</html>
