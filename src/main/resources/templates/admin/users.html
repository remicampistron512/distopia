<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Administration des utilisateurs</title>
</head>

<body>
<section layout:fragment="content">

  <div class="py-2">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="mb-1">Administration des utilisateurs</h1>
        <p class="text-muted mb-0">Gérer les utilisateurs de l’application</p>
      </div>
      <a th:href="@{/}" class="btn btn-outline-secondary">Retour à l'accueil</a>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white">
        <h2 class="h5 mb-0">Ajouter un utilisateur</h2>
      </div>

      <div class="card-body">
        <form th:action="@{/users/save}" method="post">

          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="username" class="form-label">Nom d'utilisateur</label>
              <input id="username"
                     name="username"
                     type="text"
                     class="form-control"
                     required>
            </div>

            <div class="col-md-4 mb-3">
              <label for="password" class="form-label">Mot de passe</label>
              <input id="password"
                     name="password"
                     type="password"
                     class="form-control"
                     required>
            </div>

            <div class="col-md-4 mb-3">
              <label for="role" class="form-label">Rôle</label>
              <select id="role"
                      name="role"
                      class="form-select"
                      required>
                <option value="">-- Sélectionner un rôle --</option>
                <option value="ADMIN">ADMIN</option>
                <option value="USER">USER</option>
              </select>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              Ajouter
            </button>

            <a th:href="@{/users/admin}" class="btn btn-secondary">
              Réinitialiser
            </a>
          </div>

        </form>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h2 class="h5 mb-0">Liste des utilisateurs</h2>
      </div>

      <div class="card-body">

        <div th:if="${#lists.isEmpty(users)}" class="alert alert-info mb-0">
          Aucun utilisateur disponible.
        </div>

        <div th:unless="${#lists.isEmpty(users)}" class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nom d'utilisateur</th>
              <th>Mot de passe</th>
              <th>Rôle</th>
              <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="userItem : ${users}">
              <td th:text="${userItem.id}">1</td>
              <td th:text="${userItem.username}">admin</td>
              <td>
                <span class="text-muted">••••••••</span>
              </td>
              <td>
                <span class="badge"
                      th:classappend="${userItem.role == 'ADMIN'} ? ' bg-danger' : ' bg-secondary'"
                      th:text="${userItem.role}">
                  USER
                </span>
              </td>
              <td class="text-end">
                <a th:href="@{'/users/edit/' + ${userItem.id}}"
                   class="btn btn-warning btn-sm">
                  Modifier
                </a>

                <a th:href="@{'/users/delete/' + ${userItem.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Voulez-vous vraiment supprimer cet utilisateur ?')">
                  Supprimer
                </a>
              </td>
            </tr>
            </tbody>

          </table>
        </div>

      </div>
    </div>

  </div>

</section>
</body>
</html>
