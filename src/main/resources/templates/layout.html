<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Distopia Cinema - Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>
<div th:if="${successMessage}" class="alert alert-success">
<span th:text="${successMessage}"></span>
</div>
<main class="container my-5" layout:fragment="content">
  <!-- Page content -->
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleImageInput() {
    const checkbox = document.getElementById('changeImageToggle');
    const uploadBlock = document.getElementById('imageUploadBlock');

    if (checkbox && uploadBlock) {
      uploadBlock.classList.toggle('d-none', !checkbox.checked);
    }
  }
</script>
</body>
</html>
