<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>Séances</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<section layout:fragment="content">


  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>ID</th>
      <th>Film</th>
      <th>Cinéma</th>
      <th>Date & Heure</th>
      <th>Prix</th>
      <th>Places disponibles</th>

    </tr>
    </thead>
    <tbody>
    <tr th:each="showing : ${showings}">
      <td th:text="${showing.id}"></td>
      <td th:text="${showing.movie.title}"></td>
      <td th:text="${showing.cinema.name}"></td>
      <td th:text="${#temporals.format(showing.startDateTime, 'dd/MM/yyyy HH:mm')}"></td>
      <td th:text="${showing.price}"></td>
      <td th:text="${showing.availableSeats}"></td>

    </tr>
    </tbody>
  </table>
</section>
</body>
</html>
