<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Séances</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section layout:fragment="content" class="container py-4">

  <!-- En-tête -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <h1 class="mb-2">Séances</h1>
      <p class="text-muted mb-0">
        Consultez les séances disponibles dans nos cinémas.
      </p>
    </div>
  </div>

  <!-- Liste des séances -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">

      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="h4 mb-0">À l'affiche</h2>
        <span class="text-muted"
              th:text="${showings != null ? #lists.size(showings) + ' séance(s)' : '0 séance'}">
          0 séance
        </span>
      </div>

      <div th:if="${showings != null and !#lists.isEmpty(showings)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="showing : ${showings}">
          <div class="card h-100 border-0 shadow-sm overflow-hidden">

            <!-- Image du film -->
            <img th:if="${showing.movie != null and showing.movie.imageUrl != null and !#strings.isEmpty(showing.movie.imageUrl)}"
                 th:src="@{${showing.movie.imageUrl}}"
                 th:alt="${showing.movie.title}"
                 class="img-fluid w-100"
                 style="height: 280px; object-fit: cover;">

            <div th:if="${showing.movie == null or showing.movie.imageUrl == null or #strings.isEmpty(showing.movie.imageUrl)}"
                 class="d-flex align-items-center justify-content-center bg-light text-muted"
                 style="height: 280px;">
              Aucune image disponible
            </div>

            <div class="card-body d-flex flex-column">

              <h3 class="h5 card-title mb-3"
                  th:text="${showing.movie != null ? showing.movie.title : 'Film inconnu'}">
                Titre du film
              </h3>

              <p class="card-text mb-2">
                <strong>Cinéma :</strong>
                <span th:text="${showing.cinema != null ? showing.cinema.name : 'Non renseigné'}">
                  Cinéma
                </span>
              </p>

              <p class="card-text mb-2">
                <strong>Date :</strong>
                <span th:text="${showing.startDateTime != null ? #temporals.format(showing.startDateTime, 'dd/MM/yyyy HH:mm') : 'Non renseignée'}">
                  09/04/2026 20:00
                </span>
              </p>

              <p class="card-text mb-2">
                <strong>Prix :</strong>
                <span th:text="${showing.price != null ? showing.price + ' €' : 'N/A'}">
                  10 €
                </span>
              </p>

              <p class="card-text mb-4">
                <strong>Places disponibles :</strong>
                <span th:text="${showing.availableSeats != null ? showing.availableSeats : 'N/A'}">
                  50
                </span>
              </p>

              <div class="mt-auto d-flex gap-2 flex-wrap">
                <a th:if="${showing.movie != null}"
                   th:href="@{/movies/view/{id}(id=${showing.movie.id})}"
                   class="btn btn-primary btn-sm">
                  Voir le film
                </a>

                <a th:if="${showing.cinema != null}"
                   th:href="@{/cinemas/view/{id}(id=${showing.cinema.id})}"
                   class="btn btn-outline-secondary btn-sm">
                  Voir le cinéma
                </a>
              </div>

            </div>
          </div>
        </div>
      </div>

      <div th:if="${showings == null or #lists.isEmpty(showings)}"
           class="alert alert-info mb-0">
        Aucune séance disponible pour le moment.
      </div>

    </div>
  </div>

</section>
</body>
</html>
