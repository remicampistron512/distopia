<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Formulaire Séance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section layout:fragment="content">
  <div class="container mt-4">

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <h1 class="mb-4"
            th:text="${showing.id == null ? 'Créer une séance' : 'Modifier la séance'}">
          Formulaire Séance
        </h1>

        <form th:action="@{/showings/save}"
              th:object="${showing}"
              method="post">

          <input type="hidden" th:field="*{id}">

          <div class="mb-3">
            <label for="startDateTime" class="form-label">Date et heure</label>
            <input type="datetime-local"
                   id="startDateTime"
                   th:field="*{startDateTime}"
                   class="form-control">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="price" class="form-label">Prix (€)</label>
              <input type="number"
                     step="0.01"
                     id="price"
                     th:field="*{price}"
                     class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label for="availableSeats" class="form-label">Places disponibles</label>
              <input type="number"
                     id="availableSeats"
                     th:field="*{availableSeats}"
                     class="form-control">
            </div>
          </div>

          <div class="mb-3">
            <label for="cinemaId" class="form-label">Cinéma</label>
            <select id="cinemaId"
                    name="cinemaId"
                    class="form-select">

              <option value="">-- Sélectionner un cinéma --</option>

              <option th:each="cinema : ${cinemas}"
                      th:value="${cinema.id}"
                      th:text="${cinema.name}"
                      th:selected="${showing.cinema != null and showing.cinema.id == cinema.id}">
              </option>
            </select>
          </div>

          <div class="mb-4">
            <label for="movieId" class="form-label">Film</label>
            <select id="movieId"
                    name="movieId"
                    class="form-select">

              <option value="">-- Sélectionner un film --</option>

              <option th:each="movie : ${movies}"
                      th:value="${movie.id}"
                      th:text="${movie.title}"
                      th:selected="${showing.movie != null and showing.movie.id == movie.id}">
              </option>
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              Enregistrer
            </button>

            <a th:href="@{/showings/admin}" class="btn btn-outline-secondary">
              Annuler
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</section>
</body>
</html>
