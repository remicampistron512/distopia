<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Formulaire Séance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h1 th:text="${showing.id == null ? 'Créer une séance' : 'Modifier la séance'}">Formulaire Séance</h1>

  <form th:action="@{/showings/save}" method="post">
    <input type="hidden" name="id" th:value="${showing.id}">

    <div class="mb-3">
      <label class="form-label">Date et heure</label>
      <input type="datetime-local" name="startDateTime" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Prix</label>
      <input type="number" step="0.01" name="price" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Places disponibles</label>
      <input type="number" name="availableSeats" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Cinéma</label>
      <select name="cinemaId" class="form-select">
        <option th:each="cinema : ${cinemas}"
                th:value="${cinema.id}"
                th:text="${cinema.name}">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Film</label>
      <select name="movieId" class="form-select">
        <option th:each="movie : ${movies}"
                th:value="${movie.id}"
                th:text="${movie.title}">
        </option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a th:href="@{/showings}" class="btn btn-secondary">Annuler</a>
  </form>
</div>
</body>
</html>
