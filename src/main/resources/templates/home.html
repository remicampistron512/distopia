<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Accueil</title>
</head>

<body>

<section layout:fragment="content">

  <!-- Films -->
  <section class="mb-5">
    <h2 class="mb-4">Films à l'affiche</h2>

    <div class="row g-4">
      <div class="col-md-6 col-lg-4" th:each="movie : ${movies}">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 th:text="${movie.title}"></h5>
            <p><strong>Année:</strong> <span th:text="${movie.year}"></span></p>
            <p><strong>Durée:</strong> <span th:text="${movie.duration}"></span> min</p>
            <p><strong>Genre:</strong> <span th:text="${movie.genre}"></span></p>
            <p><strong>Réalisateur:</strong> <span th:text="${movie.director}"></span></p>
            <p><strong>Note public:</strong> <span th:text="${movie.communityRating}"></span></p>
            <p><strong>Note critiques:</strong> <span th:text="${movie.criticsRating}"></span></p>
            <p><strong>Sortie:</strong>
              <span th:text="${#temporals.format(movie.releaseDate, 'dd/MM/yyyy')}"></span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Cinémas -->
  <section class="mb-5">
    <h2 class="mb-4">Les meilleurs cinémas</h2>

    <div class="row g-4">
      <div class="col-md-6 col-lg-4" th:each="cinema : ${cinemas}">
        <div class="card h-100 shadow-sm">
          <div class="card-body">

            <a th:href="@{'/cinemas/view/' + ${cinema.id}}" >
              <h5 th:text="${cinema.name}"></h5>
              <p><strong>Adresse:</strong> <span th:text="${cinema.address}"></span></p>
              <p><strong>Note public:</strong> <span th:text="${cinema.communityRating}"></span></p>
              <p><strong>Ville:</strong>
                <span th:text="${cinema.city != null ? cinema.city.name : 'N/A'}"></span>
              </p>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Villes -->
  <section class="mb-5">
    <h2 class="mb-4">Top villes</h2>

    <div class="bg-white rounded shadow-sm p-4">
      <span class="badge text-bg-secondary me-2 mb-2"
            th:each="city : ${cities}"
            th:text="${city.name}">
      </span>
    </div>
  </section>

</section>

</body>
</html>
