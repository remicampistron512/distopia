<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Formulaire Utilisateur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section layout:fragment="content">
  <div class="container mt-4">

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <h1 class="mb-4"
            th:text="${user.id == null ? 'Créer un utilisateur' : 'Modifier l’utilisateur'}">
          Formulaire Utilisateur
        </h1>

        <form th:action="@{/users/save}"
              th:object="${user}"
              method="post">

          <input type="hidden" th:field="*{id}">

          <div class="mb-3">
            <label for="username" class="form-label">Nom d'utilisateur</label>
            <input id="username"
                   type="text"
                   th:field="*{username}"
                   class="form-control">
            <div class="text-danger mt-1" th:errors="*{username}"></div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Mot de passe</label>
            <input id="password"
                   type="password"
                   th:field="*{password}"
                   class="form-control">
            <div class="text-danger mt-1" th:errors="*{password}"></div>
          </div>

          <div class="mb-4">
            <label for="role" class="form-label">Rôle</label>
            <select id="role"
                    th:field="*{role}"
                    class="form-select">
              <option value="">-- Sélectionner un rôle --</option>
              <option value="ADMIN">Administrateur</option>
              <option value="USER">Utilisateur</option>
            </select>
            <div class="text-danger mt-1" th:errors="*{role}"></div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              Enregistrer
            </button>

            <a th:href="@{/users/admin}" class="btn btn-outline-secondary">
              Annuler
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</section>
</body>
</html>
