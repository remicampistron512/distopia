<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title th:text="${cinema.name} + ' - Distopia Cinema'">Détail du cinéma</title>
</head>

<body>
<section layout:fragment="content" class="container py-4">

  <!-- Header card -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="row g-0">
      <div class="col-md-4">
        <img th:if="${cinema.imageUrl != null and !#strings.isEmpty(cinema.imageUrl)}"
             th:src="@{${cinema.imageUrl}}"
             th:alt="${cinema.name}"
             class="img-fluid w-100 h-100 rounded-start"
             style="min-height: 260px; object-fit: cover;">

        <div th:if="${cinema.imageUrl == null or #strings.isEmpty(cinema.imageUrl)}"
             class="d-flex align-items-center justify-content-center bg-light text-muted h-100 rounded-start"
             style="min-height: 260px;">
          Aucune image disponible
        </div>
      </div>

      <div class="col-md-8">
        <div class="card-body p-4 h-100 d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
              <p class="text-uppercase text-muted small mb-2">Cinéma</p>
              <h1 class="mb-3" th:text="${cinema.name}">Nom du cinéma</h1>
            </div>

            <div>
              <a th:href="@{/cinemas}" class="btn btn-outline-secondary">Retour à la liste</a>
            </div>
          </div>

          <p class="mb-2">
            <strong>Ville :</strong>
            <span th:text="${cinema.city != null ? cinema.city.name : 'Non renseignée'}">Paris</span>
          </p>

          <p class="mb-2">
            <strong>Adresse :</strong>
            <span th:text="${cinema.address != null ? cinema.address : 'Non renseignée'}">Adresse</span>
          </p>

          <p class="mb-0">
            <strong>Note public :</strong>
            <span th:text="${cinema.communityRating}">4.5</span>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Related content card -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h2 class="h4 mb-4">Séances programmées</h2>

      <div th:if="${cinema.showings != null and !#lists.isEmpty(cinema.showings)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="showing : ${cinema.showings}">
          <div class="card h-100 border-0 shadow-sm">
            <div class="card-body d-flex flex-column">
              <h3 class="h5 card-title mb-3"
                  th:text="${showing.movie != null ? showing.movie.title : 'Film inconnu'}">
                Titre du film
              </h3>

              <p class="card-text mb-2">
                <strong>Date :</strong>
                <span th:text="${showing.startDateTime != null ? #temporals.format(showing.startDateTime, 'dd/MM/yyyy HH:mm') : 'Non renseignée'}">
                  08/04/2026 20:00
                </span>
              </p>

              <p class="card-text mb-3"
                 th:if="${showing.movie != null and showing.movie.genre != null}">
                <strong>Genre :</strong>
                <span th:text="${showing.movie.genre}">Action</span>
              </p>

              <a th:if="${showing.movie != null}"
                 th:href="@{/movies/view/{id}(id=${showing.movie.id})}"
                 class="btn btn-primary mt-auto">
                Voir le film
              </a>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${cinema.showings == null or #lists.isEmpty(cinema.showings)}"
           class="alert alert-info mb-0">
        Aucune séance n’est actuellement programmée dans ce cinéma.
      </div>
    </div>
  </div>

</section>
</body>
</html>
