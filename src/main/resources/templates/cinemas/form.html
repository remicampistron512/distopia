<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Formulaire Cinéma</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section layout:fragment="content">
  <div class="container mt-4">

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <h1 class="mb-4"
            th:text="${cinema.id == null or cinema.id == 0 ? 'Créer un cinéma' : 'Modifier le cinéma'}">
          Formulaire Cinéma
        </h1>

        <form th:action="@{/cinemas/save}"
              th:object="${cinema}"
              method="post"
              enctype="multipart/form-data">

          <input type="hidden" th:field="*{id}">

          <div class="mb-3">
            <label for="name" class="form-label">Nom</label>
            <input id="name"
                   type="text"
                   th:field="*{name}"
                   class="form-control"
                   required>
          </div>

          <div class="mb-3">
            <label for="address" class="form-label">Adresse</label>
            <input id="address"
                   type="text"
                   th:field="*{address}"
                   class="form-control"
                   required>
          </div>

          <div class="mb-3">
            <label for="communityRating" class="form-label">Note des utilisateurs</label>
            <input id="communityRating"
                   type="number"
                   step="0.1"
                   min="0"
                   max="5"
                   th:field="*{communityRating}"
                   class="form-control"
                   required>
          </div>

          <div class="mb-4">
            <label for="city" class="form-label">Ville</label>
            <select id="city"
                    th:field="*{city}"
                    class="form-select"
                    required>
              <option value="">-- Sélectionner une ville --</option>
              <option th:each="city : ${cities}"
                      th:value="${city.id}"
                      th:text="${city.name}">
              </option>
            </select>
          </div>

          <div th:if="${cinema.imageUrl != null and !#strings.isEmpty(cinema.imageUrl)}"
               class="mb-4">

            <label class="form-label d-block">Image actuelle</label>

            <div class="card border-0 shadow-sm" style="max-width: 320px;">
              <img th:src="@{${cinema.imageUrl}}"
                   th:alt="${cinema.name}"
                   class="img-fluid rounded"
                   style="max-height: 220px; object-fit: cover;">
            </div>

            <div class="form-check mt-3">
              <input class="form-check-input"
                     type="checkbox"
                     id="changeImageToggle"
                     onchange="toggleImageInput()">
              <label class="form-check-label" for="changeImageToggle">
                Changer l’image
              </label>
            </div>

            <div id="imageUploadBlock" class="mt-3 d-none">
              <label for="image" class="form-label">Nouvelle image</label>
              <input id="image"
                     type="file"
                     name="image"
                     class="form-control"
                     accept="image/*">
              <div class="form-text">
                Formats acceptés : JPG, PNG, WEBP.
              </div>
            </div>
          </div>

          <div th:if="${cinema.imageUrl == null or #strings.isEmpty(cinema.imageUrl)}"
               class="mb-4">

            <label for="image" class="form-label">Image du cinéma</label>
            <input id="image"
                   type="file"
                   name="image"
                   class="form-control"
                   accept="image/*">

            <div class="form-text">
              Formats acceptés : JPG, PNG, WEBP.
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              Enregistrer
            </button>

            <a th:href="@{/cinemas/admin}" class="btn btn-outline-secondary">
              Annuler
            </a>
          </div>

        </form>

      </div>
    </div>

  </div>
</section>

</body>
</html>
