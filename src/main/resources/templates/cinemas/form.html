<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Formulaire Cinéma</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<section layout:fragment="content">
<div class="container mt-4">
  <h1 th:text="${cinema.id == 0 ? 'Créer un cinéma' : 'Modifier le cinéma'}">Formulaire Cinéma</h1>


  <form th:action="@{/cinemas/save}"
        th:object="${cinema}"
        method="post"
        enctype="multipart/form-data">
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
      <label class="form-label">Nom</label>
      <input type="text" th:field="*{name}" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Adresse</label>
      <input type="text" th:field="*{address}" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Note des utilisateurs</label>
      <input type="number" step="0.1" th:field="*{communityRating}" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Ville</label>
      <select th:field="*{city}" class="form-select">
        <option value="">-- Sélectionner une ville --</option>
        <option th:each="city : ${cities}"
                th:value="${city.id}"
                th:text="${city.name}">
        </option>
      </select>
    </div>

    <!-- Image existante -->
    <div th:if="${cinema.imageUrl != null and !#strings.isEmpty(cinema.imageUrl)}"
         class="mb-4">

      <label class="form-label d-block">Image actuelle</label>

      <div class="card border-0 shadow-sm" style="max-width: 320px;">
        <img th:src="@{${cinema.imageUrl}}"
             th:alt="${cinema.name}"
             class="img-fluid rounded"
             style="max-height: 220px; object-fit: cover;">
      </div>

      <div class="form-check mt-3">
        <input class="form-check-input"
               type="checkbox"
               id="changeImageToggle"
               onchange="toggleImageInput()">
        <label class="form-check-label" for="changeImageToggle">
          Changer l’image
        </label>
      </div>

      <div id="imageUploadBlock" class="mt-3 d-none">
        <label for="image" class="form-label">Nouvelle image</label>
        <input id="image"
               type="file"
               name="image"
               class="form-control"
               accept="image/*">
        <div class="form-text">
          Formats acceptés : JPG, PNG, WEBP.
        </div>
      </div>
    </div>

    <!-- pas encore d'image -->
    <div th:if="${cinema.imageUrl == null or #strings.isEmpty(cinema.imageUrl)}"
         class="mb-4">

      <label for="image" class="form-label">Image du cinéma</label>
      <input id="image"
             type="file"
             name="image"
             class="form-control"
             accept="image/*">

      <div class="form-text">
        Formats acceptés : JPG, PNG, WEBP.
      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        Enregistrer
      </button>

      <a th:href="@{/admin/cinemas}" class="btn btn-outline-secondary">
        Annuler
      </a>
    </div>

  </form>
</div>
</section>

</body>
</html>
