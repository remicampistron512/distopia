<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Cinemas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<section layout:fragment="content">

  <form th:action="@{/cinemas}" method="get" class="row g-3 align-items-end mb-4">
    <div class="col-md-6">
      <label for="keyword" class="form-label">Mot clé</label>
      <input id="keyword"
             type="text"
             name="keyword"
             class="form-control"
             th:value="${keyword}">
    </div>
    <div class="col-md-auto">
      <button type="submit" class="btn btn-primary">
        Rechercher
      </button>
    </div>
  </form>
  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Adresse</th>
      <th>Note public</th>
      <th>Ville</th>

    </tr>
    </thead>
    <tbody>
    <tr th:each="cinema : ${cinemas}">
      <td th:text="${cinema.id}"></td>
      <td th:text="${cinema.name}"></td>
      <td th:text="${cinema.address}"></td>
      <td th:text="${cinema.communityRating}"></td>
      <td th:text="${cinema.city != null ? cinema.city.name : 'N/A'}"></td>

    </tr>
    </tbody>
  </table>
</section>
</body>
</html>
