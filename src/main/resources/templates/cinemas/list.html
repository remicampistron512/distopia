<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Cinemas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Cinemas</h1>
    <a th:href="@{/cinemas/new}" class="btn btn-success">Ajouter Cinema</a>
  </div>

  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Adresse</th>
      <th>Note public</th>
      <th>Ville</th>
      <th style="width: 160px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cinema : ${cinemas}">
      <td th:text="${cinema.id}"></td>
      <td th:text="${cinema.name}"></td>
      <td th:text="${cinema.address}"></td>
      <td th:text="${cinema.communityRating}"></td>
      <td th:text="${cinema.city != null ? cinema.city.name : 'N/A'}"></td>
      <td>
        <a th:href="@{'/cinemas/edit/' + ${cinema.id}}" class="btn btn-warning btn-sm">Editer</a>
        <a th:href="@{'/cinemas/delete/' + ${cinema.id}}" class="btn btn-danger btn-sm"
           onclick="return confirm('Delete this cinema?')">Supprimer</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
