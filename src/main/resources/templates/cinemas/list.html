<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Cinémas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<section layout:fragment="content" class="container py-4">

  <!-- En-tête -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <h1 class="mb-2">Cinémas</h1>
      <p class="text-muted mb-0">
        Recherchez un cinéma et consultez ses informations principales.
      </p>
    </div>
  </div>

  <!-- Recherche -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <form th:action="@{/cinemas}" method="get" class="row g-3 align-items-end">
        <div class="col-md-8">
          <label for="keyword" class="form-label">Mot-clé</label>
          <input id="keyword"
                 type="text"
                 name="keyword"
                 class="form-control"
                 th:value="${keyword}"
                 placeholder="Nom du cinéma, adresse, ville...">
        </div>

        <div class="col-md-auto">
          <button type="submit" class="btn btn-primary">
            Rechercher
          </button>
        </div>

        <div class="col-md-auto" th:if="${keyword != null and !#strings.isEmpty(keyword)}">
          <a th:href="@{/cinemas}" class="btn btn-outline-secondary">
            Réinitialiser
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Résultats -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="h4 mb-0">Liste des cinémas</h2>
        <span class="text-muted"
              th:text="${cinemas != null ? #lists.size(cinemas) + ' résultat(s)' : '0 résultat'}">
          0 résultat
        </span>
      </div>

      <div th:if="${cinemas != null and !#lists.isEmpty(cinemas)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="cinema : ${cinemas}">
          <div class="card h-100 border-0 shadow-sm overflow-hidden">
            <a th:href="@{/cinemas/view/{id}(id=${cinema.id})}"
               class="text-decoration-none text-dark">

              <img th:if="${cinema.imageUrl != null and !#strings.isEmpty(cinema.imageUrl)}"
                   th:src="@{${cinema.imageUrl}}"
                   th:alt="${cinema.name}"
                   class="img-fluid w-100"
                   style="height: 240px; object-fit: cover;">

              <div th:if="${cinema.imageUrl == null or #strings.isEmpty(cinema.imageUrl)}"
                   class="d-flex align-items-center justify-content-center bg-light text-muted"
                   style="height: 240px;">
                Aucune image disponible
              </div>

              <div class="card-body">
                <h3 class="h5 card-title mb-3" th:text="${cinema.name}">Nom du cinéma</h3>

                <p class="card-text mb-2">
                  <strong>Adresse :</strong>
                  <span th:text="${cinema.address != null ? cinema.address : 'Non renseignée'}">Adresse</span>
                </p>

                <p class="card-text mb-2">
                  <strong>Note public :</strong>
                  <span th:text="${cinema.communityRating}">4.5</span>
                </p>

                <p class="card-text mb-0">
                  <strong>Ville :</strong>
                  <span th:text="${cinema.city != null ? cinema.city.name : 'N/A'}">Paris</span>
                </p>
              </div>
            </a>
          </div>
        </div>
      </div>

      <div th:if="${cinemas == null or #lists.isEmpty(cinemas)}"
           class="alert alert-info mb-0">
        Aucun cinéma ne correspond à votre recherche.
      </div>
    </div>
  </div>

</section>
</body>
</html>
