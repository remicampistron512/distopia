<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

      <!-- Logo + marque -->
      <a class="navbar-brand d-flex align-items-center fw-bold" th:href="@{/}">
        <img th:src="@{/images/logo.png}"
             alt="Logo Distopia"
             class="navbar-logo me-2">
        <span>Distopia Cinema</span>
      </a>

      <button class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNavbar"
              aria-controls="mainNavbar"
              aria-expanded="false"
              aria-label="Afficher ou masquer la navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">

        <!-- Navigation publique -->
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link"
               th:classappend="${currentPage == 'home'} ? ' active'"
               th:href="@{/}">
              Accueil
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               th:classappend="${currentPage == 'cinemas'} ? ' active'"
               th:href="@{/cinemas}">
              Cinémas
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               th:classappend="${currentPage == 'movies'} ? ' active'"
               th:href="@{/movies}">
              Films
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               th:classappend="${currentPage == 'showings'} ? ' active'"
               th:href="@{/showings}">
              À l'affiche
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               th:classappend="${currentPage == 'bookings'} ? ' active'"
               th:href="@{/bookings}">
              Réservations
            </a>
          </li>

          <!-- Dropdown admin -->
          <li class="nav-item dropdown" th:if="${session.loggedUser != null}">
            <a class="nav-link dropdown-toggle"
               href="#"
               id="adminDropdown"
               role="button"
               data-bs-toggle="dropdown"
               aria-expanded="false">
              Administration
            </a>

            <ul class="dropdown-menu dropdown-menu-dark shadow"
                aria-labelledby="adminDropdown">

              <li>
                <a class="dropdown-item"
                   th:classappend="${currentPage == 'cities/admin'} ? ' active'"
                   th:href="@{/cities/admin}">
                  Villes
                </a>
              </li>

              <li>
                <a class="dropdown-item"
                   th:classappend="${currentPage == 'cinemas/admin'} ? ' active'"
                   th:href="@{/cinemas/admin}">
                  Cinémas
                </a>
              </li>

              <li>
                <a class="dropdown-item"
                   th:classappend="${currentPage == 'movies/admin'} ? ' active'"
                   th:href="@{/movies/admin}">
                  Films
                </a>
              </li>

              <li>
                <a class="dropdown-item"
                   th:classappend="${currentPage == 'showings/admin'} ? ' active'"
                   th:href="@{/showings/admin}">
                  Séances
                </a>
              </li>

              <li>
                <a class="dropdown-item"
                   th:classappend="${currentPage == 'bookings/admin'} ? ' active'"
                   th:href="@{/bookings/admin}">
                  Réservations
                </a>
              </li>

              <li>
                <a class="dropdown-item"
                   th:classappend="${currentPage == 'users'} ? ' active'"
                   th:href="@{/users}">
                  Utilisateurs
                </a>
              </li>

            </ul>
          </li>

        </ul>

        <!-- Zone utilisateur -->
        <div class="d-flex align-items-lg-center flex-column flex-lg-row gap-2 mt-3 mt-lg-0">

          <a th:if="${session.loggedUser == null}"
             class="btn btn-outline-primary"
             th:href="@{/login}">
            Se connecter
          </a>

          <div th:if="${session.loggedUser != null}"
               class="d-flex align-items-lg-center flex-column flex-lg-row gap-2 text-white">

          <span class="small text-light">
            Bonjour <strong th:text="${session.loggedUser.username}">utilisateur</strong>
          </span>

            <a class="btn btn-outline-danger btn-sm"
               th:href="@{/logout}">
              Déconnexion
            </a>
          </div>

        </div>

      </div>
    </div>
  </nav>
</header>
</body>
</html>
