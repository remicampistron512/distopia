<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Films</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Films</h1>
    <a th:href="@{/movies/new}" class="btn btn-success">Ajouter un film</a>
  </div>

  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>ID</th>
      <th>Titre</th>
      <th>Année</th>
      <th>Durée</th>
      <th>Genre</th>
      <th>Réalisateur</th>
      <th style="width: 160px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="movie : ${movies}">
      <td th:text="${movie.id}"></td>
      <td th:text="${movie.title}"></td>
      <td th:text="${movie.year}"></td>
      <td th:text="${movie.duration}"></td>
      <td th:text="${movie.genre}"></td>
      <td th:text="${movie.director}"></td>
      <td>
        <a th:href="@{'/movies/edit/' + ${movie.id}}" class="btn btn-warning btn-sm">Modifier</a>
        <a th:href="@{'/movies/delete/' + ${movie.id}}" class="btn btn-danger btn-sm"
           onclick="return confirm('Supprimer ce film ?')">Supprimer</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
