<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Films</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section layout:fragment="content" class="container py-4">

  <!-- En-tête -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
      <h1 class="mb-2">Films</h1>
      <p class="text-muted mb-0">
        Découvrez les films disponibles et consultez leurs détails.
      </p>
    </div>
  </div>

  <!-- Liste des films -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">

      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="h4 mb-0">Liste des films</h2>
        <span class="text-muted"
              th:text="${movies != null ? #lists.size(movies) + ' film(s)' : '0 film'}">
          0 film
        </span>
      </div>

      <div th:if="${movies != null and !#lists.isEmpty(movies)}" class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="movie : ${movies}">
          <div class="card h-100 border-0 shadow-sm overflow-hidden">

            <a th:href="@{/movies/view/{id}(id=${movie.id})}"
               class="text-decoration-none text-dark">

              <img th:if="${movie.imageUrl != null and !#strings.isEmpty(movie.imageUrl)}"
                   th:src="@{${movie.imageUrl}}"
                   th:alt="${movie.title}"
                   class="img-fluid w-100"
                   style="height: 320px; object-fit: cover;">

              <div th:if="${movie.imageUrl == null or #strings.isEmpty(movie.imageUrl)}"
                   class="d-flex align-items-center justify-content-center bg-light text-muted"
                   style="height: 320px;">
                Aucune image disponible
              </div>

              <div class="card-body">
                <h3 class="h5 card-title mb-3" th:text="${movie.title}">
                  Titre du film
                </h3>

                <p class="card-text mb-2">
                  <strong>Année :</strong>
                  <span th:text="${movie.year != null ? movie.year : 'N/A'}">2025</span>
                </p>

                <p class="card-text mb-2">
                  <strong>Durée :</strong>
                  <span th:text="${movie.duration != null ? movie.duration + ' min' : 'N/A'}">
                    120 min
                  </span>
                </p>

                <p class="card-text mb-2">
                  <strong>Genre :</strong>
                  <span th:text="${movie.genre != null ? movie.genre : 'Non renseigné'}">
                    Action
                  </span>
                </p>

                <p class="card-text mb-2">
                  <strong>Réalisateur :</strong>
                  <span th:text="${movie.director != null ? movie.director : 'Non renseigné'}">
                    Director
                  </span>
                </p>

                <p class="card-text mb-0">
                  <strong>Note public :</strong>
                  <span th:text="${movie.communityRating != null ? movie.communityRating : 'N/A'}">
                    4.5
                  </span>
                </p>
              </div>

            </a>
          </div>
        </div>
      </div>

      <div th:if="${movies == null or #lists.isEmpty(movies)}"
           class="alert alert-info mb-0">
        Aucun film disponible pour le moment.
      </div>

    </div>
  </div>

</section>
</body>
</html>
