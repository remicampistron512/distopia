<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Formulaire Film</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<section layout:fragment="content">
  <div class="container mt-4">

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <h1 class="mb-4"
            th:text="${movie.id == null ? 'Créer un film' : 'Modifier le film'}">
          Formulaire Film
        </h1>

        <form th:action="@{/movies/save}"
              th:object="${movie}"
              method="post"
              enctype="multipart/form-data">

          <input type="hidden" th:field="*{id}">

          <div class="mb-3">
            <label class="form-label">Titre</label>
            <input type="text" th:field="*{title}" class="form-control">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Année</label>
              <input type="number" th:field="*{year}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Durée (minutes)</label>
              <input type="number" th:field="*{duration}" class="form-control">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Genre</label>
            <input type="text" th:field="*{genre}" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Réalisateur</label>
            <input type="text" th:field="*{director}" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Date de sortie</label>
            <input type="date" th:field="*{releaseDate}" class="form-control">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Note critiques</label>
              <input type="number" step="0.1" th:field="*{criticsRating}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Note utilisateurs</label>
              <input type="number" step="0.1" th:field="*{communityRating}" class="form-control">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Acteurs (séparés par des virgules)</label>
            <input type="text"
                   name="actorsText"
                   class="form-control"
                   placeholder="Ex : Tom Hardy, Charlize Theron">
          </div>

          <!-- Image existante -->
          <div th:if="${movie.imageUrl != null and !#strings.isEmpty(movie.imageUrl)}"
               class="mb-4">

            <label class="form-label d-block">Image actuelle</label>

            <div class="card border-0 shadow-sm" style="max-width: 320px;">
              <img th:src="@{${movie.imageUrl}}"
                   th:alt="${movie.title}"
                   class="img-fluid rounded"
                   style="max-height: 220px; object-fit: cover;">
            </div>

            <div class="form-check mt-3">
              <input class="form-check-input"
                     type="checkbox"
                     id="changeImageToggle"
                     onchange="toggleImageInput()">
              <label class="form-check-label" for="changeImageToggle">
                Changer l’image
              </label>
            </div>

            <div id="imageUploadBlock" class="mt-3 d-none">
              <label for="image" class="form-label">Nouvelle image</label>
              <input id="image"
                     type="file"
                     name="image"
                     class="form-control"
                     accept="image/*">
              <div class="form-text">
                Formats acceptés : JPG, PNG, WEBP.
              </div>
            </div>
          </div>

          <!-- Aucune image -->
          <div th:if="${movie.imageUrl == null or #strings.isEmpty(movie.imageUrl)}"
               class="mb-4">

            <label for="image" class="form-label">Image du film</label>
            <input id="image"
                   type="file"
                   name="image"
                   class="form-control"
                   accept="image/*">

            <div class="form-text">
              Formats acceptés : JPG, PNG, WEBP.
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              Enregistrer
            </button>

            <a th:href="@{/movies/admin}" class="btn btn-outline-secondary">
              Annuler
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</section>



</body>
</html>
